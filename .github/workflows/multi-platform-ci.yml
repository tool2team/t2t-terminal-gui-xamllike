name: Multi-Platform CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet-version: ['10.0.x']
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for better analysis
      
    - name: Setup .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
        
    - name: Display environment info
      run: |
        dotnet --info
        echo "OS: ${{ matrix.os }}"
        echo "Runner: ${{ runner.os }}"

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Terminal.Gui.XamlLike
      run: dotnet build Terminal.Gui.XamlLike/Terminal.Gui.XamlLike.csproj --no-restore --configuration Release

    - name: Build and run tests
      run: dotnet test Tests/Terminal.Gui.XamlLike.Tests/Terminal.Gui.XamlLike.Tests.csproj --no-restore --configuration Release --verbosity normal --logger "trx;LogFileName=test-results-${{ matrix.os }}.trx" --collect:"XPlat Code Coverage" -- RunConfiguration.DisableAppDomain=true
      
    - name: Publish test results (${{ matrix.os }})
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always() && matrix.os == 'ubuntu-latest'
      with:
        files: |
          **/test-results-*.trx
        check_name: Test Results (${{ matrix.os }})
        comment_mode: off
        
    - name: Upload test results artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}
        path: |
          **/test-results-*.trx
          **/TestResults/**/coverage.cobertura.xml
        retention-days: 30
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: always() && matrix.os == 'ubuntu-latest'
      with:
        files: '**/coverage.cobertura.xml'
        flags: unittests
        name: codecov-${{ matrix.os }}
        fail_ci_if_error: false
        verbose: true

  build-examples:
    name: Build Examples
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build all examples
      run: |
        for example in Examples/*/; do
          echo "Building $example"
          dotnet build "$example" --configuration Release
        done
      shell: bash
      
    - name: Verify examples compile
      run: echo "All examples built successfully!"

  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build with analyzer
      run: dotnet build --no-restore --configuration Release /p:TreatWarningsAsErrors=true
      continue-on-error: true
      
    - name: Run dotnet format check
      run: dotnet format --verify-no-changes --verbosity diagnostic
      continue-on-error: true

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build-and-test, build-examples]
    if: always()
    
    steps:
    - name: Check build status
      run: |
        echo "Build and Test: ${{ needs.build-and-test.result }}"
        echo "Build Examples: ${{ needs.build-examples.result }}"
        
        if [[ "${{ needs.build-and-test.result }}" == "failure" ]] || [[ "${{ needs.build-examples.result }}" == "failure" ]]; then
          echo "CI failed!"
          exit 1
        else
          echo "CI passed!"
        fi
